<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>イントロクイズ v1.5.1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red:#ff3a3a; --redg:rgba(255,58,58,0.35);
  --green:#39ff8a; --bg:#08080f;
}
body {
  background:var(--bg); font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
  color:#fff; min-height:100vh;
}

/* ── 上部バー ── */
#top-bar {
position:fixed; top:0; left:0; right:0; z-index:50;
padding:10px 14px;
background:rgba(8,8,15,0.96);
border-bottom:1px solid rgba(255,255,255,0.1);
}
#top-inner { display:flex; gap:8px; max-width:430px; margin:0 auto; }
#btn-random {
flex:1; padding:11px 6px; font-size:12px; font-weight:700;
background:rgba(255,200,0,0.08); color:#ffd700;
border:1px solid rgba(255,200,0,0.25); border-radius:10px;
cursor:pointer; font-family:inherit;
}
#btn-random.on { background:rgba(255,200,0,0.22); border-color:#ffd700; }
#btn-random:active { transform:scale(0.96); }
#btn-start {
flex:1.3; padding:11px 6px; font-size:14px; font-weight:800;
background:linear-gradient(135deg,#ff4040,#e02020); color:#fff; border:none;
border-radius:10px; cursor:pointer; letter-spacing:1px; font-family:inherit;
box-shadow:0 0 18px var(–redg);
}
#btn-start:active { transform:scale(0.96); }
#btn-start:disabled { opacity:0.35; cursor:default; box-shadow:none; background:#444; }

/* ── 画面 ── */
.page { display:none; position:fixed; inset:0; z-index:10; align-items:center; justify-content:center; padding:16px; background:var(–bg); }
.page.show { display:flex; }
#page-title { display:flex; position:relative; z-index:1; flex-direction:column; align-items:center; padding:74px 16px 40px; min-height:100vh; background:var(–bg); overflow-y:auto; }

/* ── カード ── */
.card {
background:rgba(15,15,25,0.96);
border:1px solid rgba(255,255,255,0.15); border-radius:20px; padding:22px 18px;
width:100%; max-width:430px;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

/* ── タイトル ── */
.ttl { font-size:10px; letter-spacing:5px; color:var(–red); text-transform:uppercase; text-align:center; margin-bottom:10px; }
.ttl-big { font-size:30px; font-weight:900; text-align:center; margin-bottom:3px; }
.ttl-sub { font-size:11px; color:rgba(255,255,255,0.3); text-align:center; letter-spacing:2px; margin-bottom:18px; }
.sec { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.38); margin-bottom:10px; text-transform:uppercase; }

/* ── アーティストボタン ── */
#grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.abtn {
padding:14px 8px; font-size:13px; font-weight:700;
background:rgba(255,255,255,0.1); color:#fff;
border:1.5px solid rgba(255,255,255,0.2); border-radius:14px;
cursor:pointer; font-family:inherit; text-align:center; line-height:1.5;
}
.abtn .ic { font-size:20px; display:block; margin-bottom:4px; }
.abtn .sb { font-size:10px; color:rgba(255,255,255,0.45); display:block; margin-top:2px; }
.abtn.on { background:rgba(255,58,58,0.28); border-color:rgba(255,58,58,0.75); box-shadow:0 0 14px rgba(255,58,58,0.25); }
.abtn:active { transform:scale(0.95); }

/* ── 間隔設定 ── */
.interval-row { display:flex; gap:6px; margin-bottom:12px; align-items:center; }
.interval-label { font-size:11px; color:rgba(255,255,255,0.45); white-space:nowrap; }
.ibtn {
flex:1; padding:8px 4px; font-size:12px; font-weight:700;
background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.6);
border:1px solid rgba(255,255,255,0.15); border-radius:8px;
cursor:pointer; font-family:inherit;
}
.ibtn.on { background:rgba(100,200,255,0.18); border-color:#66ccff; color:#66ccff; }
.ibtn:active { transform:scale(0.96); }

/* 取得率パネル */
#stat-panel {
margin-top:10px; padding:12px 14px;
background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.1); border-radius:12px;
font-size:11px; line-height:2; color:rgba(255,255,255,0.5);
}
#stat-panel .st { color:#fff; font-weight:700; }

/* ── ローディング ── */
.ld-icon { font-size:32px; text-align:center; margin-bottom:14px; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ld-txt { font-size:14px; color:rgba(255,255,255,0.5); text-align:center; }
.ld-sub { font-size:11px; color:rgba(255,255,255,0.28); text-align:center; margin-top:8px; }

/* ── ゲーム ── */
.gh { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.g-round { font-size:11px; color:rgba(255,255,255,0.38); }
.g-score { display:flex; gap:12px; font-size:12px; }
.ok { color:var(–green); } .ng { color:#ff6666; }

.ttrack { background:rgba(255,255,255,0.07); border-radius:5px; height:5px; margin-bottom:16px; overflow:hidden; }
#tbar { height:100%; width:100%; border-radius:5px; background:var(–red); transition:width 0.15s linear,background 0.5s; }

.viz { display:flex; justify-content:center; align-items:flex-end; gap:4px; height:44px; margin-bottom:4px; }
.vb { width:5px; border-radius:3px; background:linear-gradient(to top,var(–red),#ff8080); animation:wave 0s ease-in-out infinite alternate; }
@keyframes wave { from{transform:scaleY(0.25)} to{transform:scaleY(1)} }

#tnum { font-size:28px; font-weight:900; text-align:center; margin-bottom:10px; font-variant-numeric:tabular-nums; transition:color 0.4s; text-shadow:0 0 18px currentColor; }

.prow { display:flex; justify-content:center; margin-bottom:12px; }
#btn-pause {
padding:7px 22px; font-size:12px; font-weight:700;
background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7);
border:1px solid rgba(255,255,255,0.18); border-radius:20px;
cursor:pointer; font-family:inherit;
}
#btn-pause.paused { background:rgba(255,200,0,0.15); border-color:rgba(255,200,0,0.5); color:#ffd700; }

.arev { text-align:center; margin-bottom:12px; }
.ae { font-size:34px; margin-bottom:6px; }
.al { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:3px; }
.an { font-size:16px; font-weight:700; }
.aa { font-size:10px; color:rgba(255,255,255,0.35); margin-top:2px; }

.choices { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.cbtn {
padding:11px 7px; font-size:12px; font-weight:600;
background:rgba(255,255,255,0.07); color:#fff;
border:1px solid rgba(255,255,255,0.13); border-radius:12px; cursor:pointer;
font-family:inherit; line-height:1.4; min-height:54px;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
word-break:break-all; text-align:center;
}
.cbtn .ol { font-size:9px; color:rgba(255,255,255,0.32); }
.cbtn:active:not(:disabled) { transform:scale(0.95); }
.cbtn:disabled { cursor:default; }
.cbtn.correct { background:rgba(57,255,138,0.15); border-color:rgba(57,255,138,0.5); color:var(–green); }
.cbtn.wrong   { background:rgba(255,60,60,0.15); border-color:rgba(255,60,60,0.5); color:#ff6666; }
.cbtn.dim     { opacity:0.25; }

/* ── コンボ ── */
#combo-ov { display:none; position:fixed; inset:0; z-index:50; pointer-events:none; align-items:center; justify-content:center; }
#combo-ov.show { display:flex; }
.cbadge { background:rgba(0,0,0,0.9); border:2px solid var(–red); border-radius:16px; padding:14px 28px; text-align:center; box-shadow:0 0 36px var(–redg); animation:cpop 1.6s ease forwards; }
.ct { font-size:10px; letter-spacing:4px; color:var(–red); margin-bottom:3px; }
.cn { font-size:44px; font-weight:900; color:var(–red); line-height:1; }
@keyframes cpop { 0%{opacity:0;transform:scale(0.4)} 25%{opacity:1;transform:scale(1.1)} 50%{transform:scale(1)} 75%{opacity:1} 100%{opacity:0;transform:scale(0.9)} }

/* ── 結果 ── */
.rl { font-size:10px; letter-spacing:5px; color:var(–red); text-align:center; margin-bottom:14px; }
.rs { font-size:64px; font-weight:900; text-align:center; line-height:1; margin-bottom:4px; }
.rs span { font-size:18px; color:rgba(255,255,255,0.4); }
.rr { font-size:18px; text-align:center; margin-bottom:6px; }
.rd { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; margin-bottom:16px; }

/* 結果内取得率レポート */
#fetch-report {
padding:12px 14px; margin-bottom:16px;
background:rgba(100,200,255,0.07); border:1px solid rgba(100,200,255,0.2); border-radius:12px;
font-size:11px; line-height:1.9; color:rgba(255,255,255,0.55);
}
#fetch-report .rt { font-size:10px; letter-spacing:3px; color:#66ccff; margin-bottom:6px; }

.rbtns { display:flex; gap:10px; }
.btn-retry { flex:1; padding:14px; font-size:14px; font-weight:800; background:linear-gradient(135deg,#ff4040,#e02020); color:#fff; border:none; border-radius:12px; cursor:pointer; font-family:inherit; }
.btn-back  { flex:1; padding:14px; font-size:13px; font-weight:600; background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.65); border:1px solid rgba(255,255,255,0.15); border-radius:12px; cursor:pointer; font-family:inherit; }

.footer { padding:10px 0 4px; font-size:9px; color:rgba(255,255,255,0.15); text-align:center; }
</style>

</head>

    songs:["Lemon","Pale Blue","ピースサイン","LOSER","打上花火","Flamingo","馬と鹿","カムパネルラ","死神","海の幽霊"] },
  kinggnu:    { name:"King Gnu",           icon:"👑", sub:"TOP10", search:"King Gnu",
    songs:["白日","三文小説","飛行艇","Tremolo","千両役者","どろん","硝子窓","一途","傘","逆夢"] },
  vaundy:     { name:"Vaundy",             icon:"⚡", sub:"TOP10", search:"Vaundy",
    songs:["踊り子","怪獣の花唄","napori","東京フラッシュ","しわあわせ","まぶた","タイムパラドックス","灯火","恋風邪にのせて","チラリズム"] },
};

// ════════════════════════════
//  定数・状態
// ════════════════════════════
const PLAY_SEC = 15, TOTAL_Q = 10, OPTS = ["A","B","C","D"];
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
const LS_LOG_KEY = "iq_fetchlog_v1";

let selArtists = [], isRandom = false;
let pool = [], usedIdx = [], cur = null, choices = [];
let timerInt = null, elapsed = 0, answered = false, paused = false, audioOk = false;
let score = 0, miss = 0, combo = 0, round = 0;
let gameSession = 0;
let fetchDelay = 1000; // デフォルト1秒

// 取得率ログ（このセッション）
let fetchLog = { ok:0, ng:0, total:0, details:[] };

const audioEl = document.getElementById('audio');

// ── iOS Audio解放 ──
function unlockAudio(){
  if(audioOk) return;
  audioEl.src = SILENT;
  audioEl.play().then(()=>{ audioEl.pause(); audioEl.src=""; audioOk=true; }).catch(()=>{});
}

// ── 間隔設定 ──
function setInterval_(sec){
  fetchDelay = sec * 1000;
  document.querySelectorAll('.ibtn').forEach(b=>{
    b.classList.toggle('on', parseInt(b.dataset.sec) === sec);
  });
}

// ── アーティストグリッド生成 ──
(function(){
  const grid = document.getElementById('grid');
  Object.entries(LIBRARY).forEach(([key, a])=>{
    const btn = document.createElement('button');
    btn.className = 'abtn'; btn.dataset.key = key;
    btn.innerHTML = `<span class="ic">${a.icon}</span>${a.name}<span class="sb">${a.sub}</span>`;
    btn.addEventListener('click', ()=>{
      if(isRandom){ isRandom=false; document.getElementById('btn-random').classList.remove('on'); }
      if(selArtists.includes(key)){
        selArtists = selArtists.filter(k=>k!==key); btn.classList.remove('on');
      } else {
        selArtists.push(key); btn.classList.add('on');
      }
      updateStartBtn();
    });
    grid.appendChild(btn);
  });
})();

function toggleRandom(){
  isRandom = !isRandom;
  document.getElementById('btn-random').classList.toggle('on', isRandom);
  if(isRandom){ selArtists=[]; document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on')); }
  updateStartBtn();
}
function updateStartBtn(){
  document.getElementById('btn-start').disabled = !(isRandom || selArtists.length > 0);
}

// ── 画面切替 ──
function showPage(name){
  ['title','loading','game','result'].forEach(n=>{
    const el = document.getElementById('page-'+n);
    if(n === 'title') el.style.display = (name==='title') ? 'flex' : 'none';
    else el.classList.toggle('show', name===n);
  });
}

// ── タイトルへ戻る ──
function goTitle(){
  gameSession++;
  stopAudio(); answered=true; paused=false; hideViz();
  selArtists=[]; isRandom=false;
  document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('btn-random').classList.remove('on');
  updateStartBtn();
  updateStatPanel();
  showPage('title');
  window.scrollTo(0,0);
}

// ── ゲーム開始 ──
function onStart(){
  gameSession++;
  unlockAudio();
  score=0; miss=0; combo=0; round=0; usedIdx=[];
  fetchLog = { ok:0, ng:0, total:0, details:[] };
  const keys = isRandom ? Object.keys(LIBRARY) : selArtists;
  pool = [];
  keys.forEach(key=>{
    LIBRARY[key].songs.forEach(song=>{
      pool.push({ song, artistName:LIBRARY[key].name, search:LIBRARY[key].search });
    });
  });
  pool = shuffle(pool);
  updateScoreUI();
  nextRound();
}
document.getElementById('btn-start').addEventListener('click', onStart);
document.getElementById('btn-random').addEventListener('click', toggleRandom);
document.getElementById('btn-pause').addEventListener('click', togglePause);
document.getElementById('btn-retry').addEventListener('click', onStart);
document.getElementById('btn-back').addEventListener('click', goTitle);
document.querySelectorAll('.ibtn').forEach(b=>{
  b.addEventListener('click', ()=>setInterval_(parseInt(b.dataset.sec)));
});

// ── 次の問題 ──
async function nextRound(){
  const mySession = gameSession;
  stopAudio(); answered=false; paused=false;
  updatePauseBtn(); hideViz();

  // DOM リセット
  const ar = document.getElementById('arev');
  ar.style.display = 'none';
  document.getElementById('tnum').style.display = 'block';
  document.getElementById('btn-pause').style.display = '';
  document.getElementById('choices').innerHTML = '';

  const avail = pool.filter((_,i)=>!usedIdx.includes(i));
  if(!avail.length || round >= TOTAL_Q){ showResult(); return; }

  const item = shuffle(avail)[0];
  usedIdx.push(pool.indexOf(item)); cur = item;

  const others = [...new Set(shuffle(pool.filter(p=>p.song!==item.song).map(p=>p.song)))].slice(0,3);
  choices = shuffle([item.song, ...others]);

  document.getElementById('g-round').textContent = `${round+1} / ${TOTAL_Q}問`;
  document.getElementById('ld-sub').textContent = `${item.artistName} — ${item.song}`;
  showPage('loading');

  // ── 間隔を置いてからフェッチ ──
  await sleep(fetchDelay);
  if(gameSession !== mySession) return;

  const t0 = Date.now();
  let url = await fetchPreview(item.search, item.song);
  if(!url) url = await fetchPreview(item.artistName, item.song);
  const ms = Date.now() - t0;

  // ログ記録
  fetchLog.total++;
  if(url){ fetchLog.ok++; }
  else    { fetchLog.ng++; }
  fetchLog.details.push({
    song: item.song,
    artist: item.artistName,
    ok: !!url,
    delay: fetchDelay/1000,
    ms
  });
  saveFetchLog();

  if(gameSession !== mySession) return;

  buildChoices(); resetBar();
  document.getElementById('tnum').textContent = PLAY_SEC;
  document.getElementById('tnum').style.color = 'var(--red)';
  showPage('game');

  if(!url){
    // 音源なし → 自動スキップ（カウントせず）
    answered = true;
    setTimeout(()=>{ if(gameSession===mySession){ round++; nextRound(); } }, 1500);
    return;
  }

  audioEl.src = item.url || url;
  audioEl.src = url;
  audioEl.currentTime = 0;
  audioEl.play().then(()=>{ buildViz(); startTimer(); }).catch(()=>startTimer());
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));

// ── iTunes API ──
async function fetchPreview(artist, song){
  try{
    const q = encodeURIComponent(artist+' '+song);
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&country=jp&limit=5`);
    const d = await r.json();
    const h = (d.results||[]).find(x=>x.previewUrl);
    return h ? h.previewUrl : null;
  }catch{ return null; }
}

// ── ログ保存・表示 ──
function saveFetchLog(){
  try{
    const stored = JSON.parse(localStorage.getItem(LS_LOG_KEY)||'[]');
    fetchLog.details.forEach(d=>{
      stored.push({ ...d, date: new Date().toLocaleDateString('ja-JP') });
    });
    // 直近200件だけ保持
    localStorage.setItem(LS_LOG_KEY, JSON.stringify(stored.slice(-200)));
  }catch{}
}

function updateStatPanel(){
  try{
    const stored = JSON.parse(localStorage.getItem(LS_LOG_KEY)||'[]');
    if(!stored.length){ document.getElementById('stat-body').textContent='まだデータがありません'; return; }

    // 間隔別に集計
    const byDelay = {};
    stored.forEach(d=>{
      const k = d.delay+'秒';
      if(!byDelay[k]) byDelay[k] = { ok:0, ng:0 };
      d.ok ? byDelay[k].ok++ : byDelay[k].ng++;
    });

    let html = '';
    Object.entries(byDelay).sort().forEach(([k,v])=>{
      const tot = v.ok+v.ng;
      const pct = Math.round(v.ok/tot*100);
      html += `間隔<b>${k}</b>: ${v.ok}/${tot}曲成功 <b style="color:${pct>=70?'#39ff8a':'#ff6666'}">${pct}%</b><br>`;
    });
    html += `<span style="color:rgba(255,255,255,0.3);font-size:10px">累計${stored.length}件記録</span>`;
    document.getElementById('stat-body').innerHTML = html;
  }catch{}
}

// ── タイマー ──
function startTimer(){
  elapsed=0;
  timerInt = setInterval(()=>{
    if(paused) return;
    elapsed+=0.1;
    const left=Math.max(0,PLAY_SEC-elapsed);
    const pct=left/PLAY_SEC;
    const c=pct>0.5?'var(--red)':pct>0.25?'#ff8800':'#ffcc00';
    const el=document.getElementById('tnum');
    el.textContent=Math.ceil(left); el.style.color=c; el.style.textShadow=`0 0 18px ${c}`;
    updateBar(pct);
    if(left<=0){ clearInterval(timerInt); audioEl.pause(); timeUp(); }
  },100);
}
function stopAudio(){ audioEl.pause(); audioEl.removeAttribute('src'); clearInterval(timerInt); timerInt=null; }
function resetBar(){ const b=document.getElementById('tbar'); b.style.transition='none'; b.style.width='100%'; }
function updateBar(pct){
  const b=document.getElementById('tbar');
  b.style.transition='width 0.15s linear,background 0.5s';
  b.style.width=(pct*100)+'%';
  b.style.background=pct>0.5?'var(--red)':pct>0.25?'#ff8800':'#ffcc00';
}
function timeUp(){
  if(answered)return;
  answered=true; miss++; combo=0; stopAudio(); hideViz(); updateScoreUI();
  revealAnswer(false);
  scheduleNext();
}

// ── ポーズ ──
function togglePause(){
  if(answered)return;
  paused=!paused;
  paused ? audioEl.pause() : audioEl.play().catch(()=>{});
  updatePauseBtn();
}
function updatePauseBtn(){
  const b=document.getElementById('btn-pause');
  b.textContent=paused?'▶ 再開':'⏸ ポーズ';
  b.classList.toggle('paused',paused);
}

// ── 選択肢 ──
function buildChoices(){
  const c=document.getElementById('choices'); c.innerHTML='';
  choices.forEach((song,i)=>{
    const btn=document.createElement('button'); btn.className='cbtn';
    btn.innerHTML=`<span class="ol">${OPTS[i]}</span>${song}`;
    btn.addEventListener('click',()=>handleAnswer(song,btn));
    c.appendChild(btn);
  });
}
function handleAnswer(song,btn){
  if(answered||paused)return;
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true); // 即無効化
  answered=true; stopAudio(); hideViz();
  const ok=song===cur.song;
  document.querySelectorAll('.cbtn').forEach((b,i)=>{
    if(choices[i]===cur.song) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){score++;combo++;if(combo>=2)showCombo(combo);}else{miss++;combo=0;}
  updateScoreUI(); revealAnswer(ok); scheduleNext();
}
function revealAnswer(ok){
  document.getElementById('ae').textContent=ok?'🎉':'😭';
  document.getElementById('an').textContent=cur.song;
  document.getElementById('an').style.color=ok?'var(--green)':'#ff6666';
  document.getElementById('aa').textContent=cur.artistName;
  const el=document.getElementById('arev');
  el.style.display='block';
  document.getElementById('tnum').style.display='none';
  document.getElementById('btn-pause').style.display='none';
}
function scheduleNext(){
  round++;
  const s=gameSession;
  setTimeout(()=>{ if(gameSession===s) nextRound(); },2200);
}
function updateScoreUI(){ document.getElementById('g-ok').textContent=score; document.getElementById('g-ng').textContent=miss; }
function showCombo(n){
  document.getElementById('cn').textContent=n+'x';
  const el=document.getElementById('combo-ov');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1700);
}

// ── ビジュアライザー ──
function buildViz(){
  const v=document.getElementById('viz'); v.innerHTML='';
  [16,28,42,34,50,38,24,46,32,20].forEach((h,i)=>{
    const b=document.createElement('div'); b.className='vb';
    b.style.cssText=`height:${h}px;animation-duration:${0.4+i*0.07}s;animation-delay:${i*0.05}s;`;
    v.appendChild(b);
  });
}
function hideViz(){ document.getElementById('viz').innerHTML=''; }

// ── 結果 ──
function showResult(){
  const pct=(score/TOTAL_Q)*100;
  const rank=pct>=90?'🏆 完璧！':pct>=70?'🎸 すごい！':pct>=50?'🎵 なかなか！':pct>=30?'😅 もう少し！':'🔰 要特訓！';
  document.getElementById('rs').innerHTML=`${score}<span>/${TOTAL_Q}</span>`;
  document.getElementById('rr').textContent=rank;
  document.getElementById('rd').textContent=`正解 ${score}問 ／ ミス ${miss}問`;

  // フェッチレポート
  const okPct = fetchLog.total ? Math.round(fetchLog.ok/fetchLog.total*100) : 0;
  let rep = `間隔: <b>${fetchDelay/1000}秒</b><br>`;
  rep += `取得成功: <b style="color:#39ff8a">${fetchLog.ok}曲</b> ／ 失敗: <b style="color:#ff6666">${fetchLog.ng}曲</b><br>`;
  rep += `取得率: <b style="color:${okPct>=70?'#39ff8a':'#ff6666'}">${okPct}%</b><br>`;
  if(fetchLog.ng > 0){
    rep += `<br>失敗した曲:<br>`;
    fetchLog.details.filter(d=>!d.ok).forEach(d=>{
      rep += `• ${d.artist} — ${d.song}<br>`;
    });
  }
  document.getElementById('report-body').innerHTML = rep;
  updateStatPanel();
  showPage('result');
}

// ── 初期化 ──
function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
document.getElementById('btn-start').disabled = true;
showPage('title');
updateStatPanel();
</script>

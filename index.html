<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>イントロクイズ</title>
<style>
/* ─── リセット ─── */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red:#ff3a3a; --redg:rgba(255,58,58,0.4);
  --green:#39ff8a; --bg:#08080f;
  --card:rgba(255,255,255,0.05); --bdr:rgba(255,255,255,0.1);
}

/* ─── body ─── */
body {
background:var(–bg);
font-family:‘Hiragino Kaku Gothic ProN’,‘Yu Gothic’,sans-serif;
color:#fff; min-height:100vh;
}

/* ─── 背景 ─── */
.bg-glow {
position:fixed; inset:0; z-index:0; pointer-events:none;
background:
radial-gradient(ellipse at 15% 50%,rgba(255,50,50,0.08) 0%,transparent 55%),
radial-gradient(ellipse at 85% 20%,rgba(80,80,255,0.07) 0%,transparent 55%);
}

/* ─── 画面管理 ─── */
/* タイトル画面：スクロール可能なページ */
#page-title {
display:block;
position:relative; z-index:1;
padding:70px 16px 40px;
min-height:100vh;
display:flex; align-items:flex-start; justify-content:center;
background:var(–bg);
}
#page-title.hidden { display:none; }

/* ゲーム系画面：全画面固定オーバーレイ */
.overlay {
display:none;
position:fixed; inset:0; z-index:10;
align-items:center; justify-content:center;
padding:16px;
background:var(–bg);
}
.overlay.show { display:flex; }

/* ─── 上部固定バー（タイトル画面専用） ─── */
#top-bar {
position:fixed; top:0; left:0; right:0; z-index:20;
padding:10px 14px;
background:rgba(8,8,15,0.95);
backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,0.08);
box-shadow:0 2px 16px rgba(0,0,0,0.6);
}
#top-bar-inner { display:flex; gap:8px; max-width:430px; margin:0 auto; }
#btn-random {
flex:1; padding:11px 6px; font-size:12px; font-weight:700;
background:rgba(255,200,0,0.08); color:#ffd700;
border:1px solid rgba(255,200,0,0.25); border-radius:10px;
cursor:pointer; font-family:inherit; transition:all 0.15s;
}
#btn-random.on { background:rgba(255,200,0,0.22); border-color:#ffd700; box-shadow:0 0 12px rgba(255,200,0,0.3); }
#btn-random:active { transform:scale(0.96); }
#btn-start {
flex:1.2; padding:11px 6px; font-size:14px; font-weight:800;
background:linear-gradient(135deg,#ff4040,#e02020); color:#fff; border:none;
border-radius:10px; cursor:pointer; letter-spacing:1px;
box-shadow:0 0 20px var(–redg); font-family:inherit; transition:transform 0.1s;
}
#btn-start:active { transform:scale(0.96); }
#btn-start:disabled { opacity:0.38; cursor:default; box-shadow:none; background:#444; }
#btn-reset {
padding:11px 10px; font-size:11px; font-weight:600;
background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.45);
border:1px solid rgba(255,255,255,0.12); border-radius:10px;
cursor:pointer; font-family:inherit; white-space:nowrap;
}
#btn-reset:active { transform:scale(0.96); }

/* ─── カード ─── */
.card {
background:rgba(15,15,25,0.95);
backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.15); border-radius:22px; padding:22px 18px;
box-shadow:0 0 60px rgba(255,50,50,0.1),0 20px 50px rgba(0,0,0,0.8);
width:100%; max-width:430px;
}

/* ─── タイトル ─── */
.ttl-label { font-size:10px; letter-spacing:5px; color:var(–red); text-transform:uppercase; text-align:center; margin-bottom:10px; }
.ttl-main  { font-size:30px; font-weight:900; text-align:center; letter-spacing:-1px; line-height:1.1; margin-bottom:3px; }
.ttl-sub   { font-size:11px; color:rgba(255,255,255,0.3); text-align:center; letter-spacing:2px; margin-bottom:18px; }

/* 除外中バナー */
#exclude-banner {
display:none; font-size:10px; color:#ffd700;
padding:6px 10px; margin-bottom:10px;
background:rgba(255,200,0,0.07); border:1px solid rgba(255,200,0,0.2); border-radius:8px;
}

/* ─── アーティストグリッド ─── */
.sec-label { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.38); margin-bottom:10px; text-transform:uppercase; }
#artist-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.abtn {
padding:14px 8px; font-size:13px; font-weight:700;
background:rgba(255,255,255,0.1); color:#fff;
border:1.5px solid rgba(255,255,255,0.2); border-radius:14px;
cursor:pointer; font-family:inherit; text-align:center; line-height:1.5;
transition:all 0.15s;
}
.abtn span.icon { font-size:20px; display:block; margin-bottom:4px; }
.abtn span.sub  { font-size:10px; color:rgba(255,255,255,0.5); display:block; margin-top:2px; }
.abtn.on {
background:rgba(255,58,58,0.3);
border-color:rgba(255,58,58,0.8);
box-shadow:0 0 16px rgba(255,58,58,0.3);
color:#fff;
}
.abtn:active { transform:scale(0.95); }

/* ─── ローディング ─── */
.ld-icon { font-size:32px; text-align:center; margin-bottom:14px; animation:spin 1s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.ld-text { font-size:14px; color:rgba(255,255,255,0.5); text-align:center; }
.ld-sub  { font-size:11px; color:rgba(255,255,255,0.28); text-align:center; margin-top:6px; }
#preload-track { background:rgba(255,255,255,0.07); border-radius:5px; height:4px; margin-top:16px; overflow:hidden; }
#preload-bar { height:100%; width:0%; background:var(–red); border-radius:5px; transition:width 0.3s; }
#preload-count { font-size:10px; color:rgba(255,255,255,0.3); text-align:center; margin-top:8px; }

/* ─── ゲーム ─── */
.g-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.g-round  { font-size:11px; color:rgba(255,255,255,0.38); }
.g-score  { display:flex; gap:12px; font-size:12px; }
.g-ok  { color:var(–green); }
.g-ng  { color:#ff6666; }

.timer-track { background:rgba(255,255,255,0.07); border-radius:5px; height:5px; margin-bottom:16px; overflow:hidden; }
#timer-bar { height:100%; width:100%; border-radius:5px; background:var(–red); transition:width 0.15s linear,background 0.5s; }

.viz { display:flex; justify-content:center; align-items:flex-end; gap:4px; height:44px; margin-bottom:4px; }
.vbar { width:5px; border-radius:3px; background:linear-gradient(to top,var(–red),#ff8080); animation:wave 0s ease-in-out infinite alternate; }
@keyframes wave { from{transform:scaleY(0.25)} to{transform:scaleY(1)} }

#time-num { font-size:28px; font-weight:900; text-align:center; margin-bottom:10px; font-variant-numeric:tabular-nums; transition:color 0.4s; text-shadow:0 0 18px currentColor; }

.pause-row { display:flex; justify-content:center; margin-bottom:12px; }
#btn-pause {
padding:7px 22px; font-size:12px; font-weight:700;
background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7);
border:1px solid rgba(255,255,255,0.18); border-radius:20px;
cursor:pointer; font-family:inherit; letter-spacing:1px;
}
#btn-pause.paused { background:rgba(255,200,0,0.15); border-color:rgba(255,200,0,0.5); color:#ffd700; }
#btn-pause:active { transform:scale(0.95); }

.ans-reveal { text-align:center; margin-bottom:12px; animation:fadeUp 0.3s ease; }
.ans-emoji  { font-size:34px; margin-bottom:6px; }
.ans-label  { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:3px; }
.ans-name   { font-size:16px; font-weight:700; }
.ans-artist { font-size:10px; color:rgba(255,255,255,0.35); margin-top:2px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.choices { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.cbtn {
padding:11px 7px; font-size:12px; font-weight:600;
background:rgba(255,255,255,0.07); color:#fff;
border:1px solid rgba(255,255,255,0.13); border-radius:12px; cursor:pointer;
font-family:inherit; line-height:1.4; min-height:54px;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
transition:transform 0.1s,background 0.2s; word-break:break-all; text-align:center;
}
.cbtn .ol { font-size:9px; color:rgba(255,255,255,0.32); font-weight:500; }
.cbtn:active:not(:disabled) { transform:scale(0.95); }
.cbtn:disabled { cursor:default; }
.cbtn.correct { background:rgba(57,255,138,0.15); border-color:rgba(57,255,138,0.5); color:var(–green); box-shadow:0 0 14px rgba(57,255,138,0.2); animation:popIn 0.3s ease; }
.cbtn.wrong   { background:rgba(255,60,60,0.15); border-color:rgba(255,60,60,0.5); color:#ff6666; animation:shake 0.3s ease; }
.cbtn.dim     { opacity:0.25; }
@keyframes popIn { 0%{transform:scale(1)} 40%{transform:scale(1.06)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(3px)} }

/* ─── コンボ ─── */
#combo-ov { display:none; position:fixed; inset:0; z-index:50; pointer-events:none; align-items:center; justify-content:center; }
#combo-ov.show { display:flex; }
.combo-badge { background:rgba(0,0,0,0.9); border:2px solid var(–red); border-radius:16px; padding:14px 28px; text-align:center; box-shadow:0 0 36px var(–redg); animation:comboPop 1.6s ease forwards; }
.combo-t { font-size:10px; letter-spacing:4px; color:var(–red); margin-bottom:3px; }
.combo-n { font-size:44px; font-weight:900; color:var(–red); line-height:1; }
@keyframes comboPop { 0%{opacity:0;transform:scale(0.4)} 25%{opacity:1;transform:scale(1.1)} 50%{transform:scale(1)} 75%{opacity:1} 100%{opacity:0;transform:scale(0.9)} }

/* ─── 結果 ─── */
.res-label  { font-size:10px; letter-spacing:5px; color:var(–red); text-align:center; margin-bottom:14px; }
.res-score  { font-size:64px; font-weight:900; text-align:center; line-height:1; margin-bottom:4px; }
.res-score span { font-size:18px; color:rgba(255,255,255,0.4); }
.res-rank   { font-size:18px; text-align:center; margin-bottom:6px; }
.res-detail { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; margin-bottom:18px; }
#no-audio-box { display:none; margin-bottom:16px; padding:12px 14px; background:rgba(255,200,0,0.07); border:1px solid rgba(255,200,0,0.22); border-radius:12px; }
#no-audio-box .nab-title { font-size:10px; color:#ffd700; letter-spacing:2px; margin-bottom:8px; }
#no-audio-list { font-size:11px; color:rgba(255,255,255,0.5); line-height:1.9; }
.res-btns { display:flex; gap:10px; }
.btn-retry { flex:1; padding:14px; font-size:14px; font-weight:800; background:linear-gradient(135deg,#ff4040,#e02020); color:#fff; border:none; border-radius:12px; cursor:pointer; font-family:inherit; }
.btn-retry:active { transform:scale(0.96); }
.btn-back { flex:1; padding:14px; font-size:13px; font-weight:600; background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.65); border:1px solid rgba(255,255,255,0.15); border-radius:12px; cursor:pointer; font-family:inherit; }
.btn-back:active { transform:scale(0.96); }

/* ─── フッター ─── */
.footer { position:relative; z-index:1; padding:10px 0 4px; font-size:9px; color:rgba(255,255,255,0.15); text-align:center; }
</style>

</head>
<body>
<div class="bg-glow"></div>
<audio id="audio" playsinline webkit-playsinline preload="none"></audio>

<!-- ══ 上部固定バー ══ -->

<div id="top-bar">
  <div id="top-bar-inner">
    <button id="btn-random" onclick="toggleRandom()">🎲 ランダム</button>
    <button id="btn-start" disabled onclick="onStart()">▶ スタート</button>
    <button id="btn-reset" onclick="resetExcluded()">🗑 リセット</button>
  </div>
</div>

<!-- ══ タイトル画面（スクロール可） ══ -->

<div id="page-title">
  <div class="card">
    <div class="ttl-label">INTRO QUIZ</div>
    <div class="ttl-main">イントロクイズ</div>
    <div class="ttl-sub">J-POP 早押し 4択</div>
    <div id="exclude-banner"></div>
    <div class="sec-label">アーティストを選ぶ（複数OK）</div>
    <div id="artist-grid"></div>
    <div class="footer">♪ iTunes Preview 使用 ／ 著作権は各アーティストに帰属します</div>
  </div>
</div>

<!-- ══ ローディング画面 ══ -->

<div id="page-loading" class="overlay">
  <div class="card" style="text-align:center;padding:40px 20px;">
    <div class="ld-icon">🎵</div>
    <div class="ld-text" id="ld-text">音源を確認中...</div>
    <div class="ld-sub" id="ld-sub"></div>
    <div id="preload-track"><div id="preload-bar"></div></div>
    <div id="preload-count"></div>
  </div>
</div>

<!-- ══ ゲーム画面 ══ -->

<div id="page-game" class="overlay">
  <div class="card">
    <div class="g-header">
      <div class="g-round" id="g-round">1 / 10問</div>
      <div class="g-score">
        <span class="g-ok">✓ <span id="g-ok">0</span></span>
        <span class="g-ng">✗ <span id="g-ng">0</span></span>
      </div>
    </div>
    <div class="timer-track"><div id="timer-bar"></div></div>
    <div class="viz" id="viz"></div>
    <div id="time-num">15</div>
    <div class="pause-row">
      <button id="btn-pause" onclick="togglePause()">⏸ ポーズ</button>
    </div>
    <div class="ans-reveal" id="ans-reveal" style="display:none;">
      <div class="ans-emoji" id="ans-emoji"></div>
      <div class="ans-label">正解</div>
      <div class="ans-name" id="ans-name"></div>
      <div class="ans-artist" id="ans-artist"></div>
    </div>
    <div class="choices" id="choices"></div>
  </div>
</div>

<!-- ══ 結果画面 ══ -->

<div id="page-result" class="overlay">
  <div class="card">
    <div class="res-label">RESULT</div>
    <div class="res-score" id="res-score">0<span>/10</span></div>
    <div class="res-rank" id="res-rank"></div>
    <div class="res-detail" id="res-detail"></div>
    <div id="no-audio-box">
      <div class="nab-title">⚠ 音源が見つからなかった曲（除外済み）</div>
      <div id="no-audio-list"></div>
    </div>
    <div class="res-btns">
      <button class="btn-retry" onclick="onStart()">もう一度</button>
      <button class="btn-back" onclick="goTitle()">選択に戻る</button>
    </div>
  </div>
</div>

<!-- ══ コンボ演出 ══ -->

<div id="combo-ov">
  <div class="combo-badge">
    <div class="combo-t">COMBO</div>
    <div class="combo-n" id="combo-n">2x</div>
  </div>
</div>

    songs:["天体観測","花の名","車輪の唄","ダイヤモンド","Aurora","ゼロ","望遠のマーチ","Smile","ray","記念撮影"] },
  spitz:      { name:"スピッツ",            icon:"🐶", sub:"TOP10", search:"スピッツ",
    songs:["チェリー","ロビンソン","空も飛べるはず","優しいあの子","楓","8823","渚","春の歌","醒めない","夢追い虫"] },
  radwimps:   { name:"RADWIMPS",           icon:"🌪", sub:"TOP10", search:"RADWIMPS",
    songs:["前前前世","愛にできることはまだあるかい","有心論","なんでもないや","ふたりごと","スパークル","会心の一撃","トレモロ","そっけない","バイオレンス"] },
  yonezu:     { name:"米津玄師",            icon:"🦋", sub:"TOP10", search:"米津玄師",
    songs:["Lemon","Pale Blue","ピースサイン","LOSER","打上花火","Flamingo","馬と鹿","カムパネルラ","死神","海の幽霊"] },
  kinggnu:    { name:"King Gnu",           icon:"👑", sub:"TOP10", search:"King Gnu",
    songs:["白日","三文小説","飛行艇","Tremolo","千両役者","どろん","硝子窓","一途","傘","逆夢"] },
  vaundy:     { name:"Vaundy",             icon:"⚡", sub:"TOP10", search:"Vaundy",
    songs:["踊り子","怪獣の花唄","napori","東京フラッシュ","しわあわせ","まぶた","タイムパラドックス","灯火","恋風邪にのせて","チラリズム"] },
};

// ════════════════════════════════════
//  定数・状態
// ════════════════════════════════════
const PLAY_SEC = 15, TOTAL_Q = 10, OPTS = ["A","B","C","D"];
const SILENT = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
const LS_KEY = "iq_excluded_v1";

let selectedArtists = [];
let isRandom = false;
let pool = [], usedIdx = [], cur = null, choices = [];
let timerInt = null, elapsed = 0, answered = false, paused = false, audioOk = false;
let noAudioThisSession = [];

const audioEl = document.getElementById('audio');

// ════════════════════════════════════
//  localStorage
// ════════════════════════════════════
function loadExcluded(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch{ return []; } }
function saveExcluded(list){ try{ localStorage.setItem(LS_KEY,JSON.stringify(list)); }catch{} }
function resetExcluded(){
  if(!confirm('音源なし除外リストをリセットしますか？')) return;
  localStorage.removeItem(LS_KEY);
  updateExcludeBanner();
}
function updateExcludeBanner(){
  const n = loadExcluded().length;
  const el = document.getElementById('exclude-banner');
  if(n > 0){ el.style.display='block'; el.textContent=`⚠ 除外中: ${n}曲（音源なし済み）`; }
  else{ el.style.display='none'; }
}

// ════════════════════════════════════
//  iOS Audio解放
// ════════════════════════════════════
function unlockAudio(){
  if(audioOk) return;
  audioEl.src=SILENT;
  audioEl.play().then(()=>{ audioEl.pause(); audioEl.src=""; audioOk=true; }).catch(()=>{});
}

// ════════════════════════════════════
//  アーティストグリッド生成
// ════════════════════════════════════
(function buildGrid(){
  const grid = document.getElementById('artist-grid');
  Object.entries(LIBRARY).forEach(([key, a]) => {
    const btn = document.createElement('button');
    btn.className = 'abtn';
    btn.dataset.key = key;
    btn.innerHTML = `<span class="icon">${a.icon}</span>${a.name}<span class="sub">${a.sub}</span>`;
    btn.addEventListener('click', () => {
      if(isRandom){ isRandom=false; document.getElementById('btn-random').classList.remove('on'); }
      if(selectedArtists.includes(key)){
        selectedArtists = selectedArtists.filter(k=>k!==key);
        btn.classList.remove('on');
      } else {
        selectedArtists.push(key);
        btn.classList.add('on');
      }
      updateStartBtn();
    });
    grid.appendChild(btn);
  });
})();

function toggleRandom(){
  isRandom = !isRandom;
  document.getElementById('btn-random').classList.toggle('on', isRandom);
  if(isRandom){
    selectedArtists = [];
    document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on'));
  }
  updateStartBtn();
}

function updateStartBtn(){
  document.getElementById('btn-start').disabled = !(isRandom || selectedArtists.length > 0);
}

// ════════════════════════════════════
//  画面切り替え（シンプル）
// ════════════════════════════════════
function showPage(name){
  document.getElementById('page-title').style.display   = (name==='title')   ? 'flex' : 'none';
  document.getElementById('page-loading').style.display = (name==='loading') ? 'flex' : 'none';
  document.getElementById('page-game').style.display    = (name==='game')    ? 'flex' : 'none';
  document.getElementById('page-result').style.display  = (name==='result')  ? 'flex' : 'none';
}

function goTitle(){
  gameSession++; // ← 最初にセッションを無効化（進行中のsetTimeoutを全部止める）
  stopAudio();
  answered = true; paused = false;
  hideViz();
  // アーティスト選択状態をリセット
  selectedArtists = [];
  isRandom = false;
  document.querySelectorAll('.abtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('btn-random').classList.remove('on');
  updateStartBtn();
  updateExcludeBanner();
  showPage('title');
  window.scrollTo(0,0);
}

// ════════════════════════════════════
//  ゲーム開始
// ════════════════════════════════════
function onStart(){
  gameSession++; // 新しいゲームセッション開始
  unlockAudio();
  score=0; miss=0; combo=0; round=0; usedIdx=[]; noAudioThisSession=[];
  const excluded = loadExcluded();
  const keys = isRandom ? Object.keys(LIBRARY) : selectedArtists;
  pool = [];
  keys.forEach(key=>{
    LIBRARY[key].songs.forEach(song=>{
      const id = key+'__'+song;
      if(!excluded.includes(id)){
        pool.push({ song, artistName:LIBRARY[key].name, search:LIBRARY[key].search, id, url:null });
      }
    });
  });
  pool = shuffle(pool);
  updateScoreUI();
  preloadAndStart();
}

document.getElementById('btn-start').addEventListener('click', onStart);

// ════════════════════════════════════
//  プリロード
// ════════════════════════════════════
async function preloadAndStart(){
  showPage('loading');
  document.getElementById('ld-text').textContent = '音源を確認中...';
  document.getElementById('ld-sub').textContent  = '';
  document.getElementById('preload-bar').style.width = '0%';
  document.getElementById('preload-count').textContent = '';

  const targets = pool.slice(0, Math.min(40, pool.length));
  let done = 0;
  const excluded = loadExcluded();

  const BATCH = 5;
  for(let i=0; i<targets.length; i+=BATCH){
    // タイトルに戻っていたら中断
    if(document.getElementById('page-loading').style.display==='none') return;
    const batch = targets.slice(i, i+BATCH);
    await Promise.all(batch.map(async item=>{
      let url = await fetchPreview(item.search, item.song);
      if(!url) url = await fetchPreview(item.artistName, item.song);
      item.url = url;
      if(!url){
        noAudioThisSession.push(`${item.artistName} — ${item.song}`);
        if(!excluded.includes(item.id)){
          excluded.push(item.id);
          saveExcluded(excluded);
        }
      }
      done++;
      const pct = Math.round(done/targets.length*100);
      document.getElementById('preload-bar').style.width = pct+'%';
      document.getElementById('preload-count').textContent = `${done} / ${targets.length} 曲確認済み`;
    }));
    if(pool.filter(p=>p.url).length >= TOTAL_Q) break;
  }

  pool = pool.filter(p=>p.url);

  if(pool.length < 3){
    document.getElementById('ld-text').textContent = '音源が見つかりませんでした';
    document.getElementById('preload-count').textContent = '別のアーティストを選んでください';
    setTimeout(goTitle, 3000);
    return;
  }

  nextRound();
}

// ════════════════════════════════════
//  ラウンド
// ════════════════════════════════════
let score=0, miss=0, combo=0, round=0;
let gameSession = 0; // セッションID（タイトルに戻るたびに増加）

async function nextRound(){
  stopAudio(); answered=false; paused=false;
  updatePauseBtn(); hideViz();

  // ── DOM完全リセット ──
  const ansEl = document.getElementById('ans-reveal');
  ansEl.style.display = 'none';
  ansEl.style.animation = 'none'; // アニメーション残留を防ぐ
  void ansEl.offsetWidth;         // リフロー
  ansEl.style.animation = '';

  const timeEl = document.getElementById('time-num');
  timeEl.style.display = 'block';
  timeEl.style.color = 'var(--red)';
  timeEl.textContent = PLAY_SEC;

  document.getElementById('btn-pause').style.display = '';
  document.getElementById('choices').innerHTML = ''; // 選択肢も先にクリア

  const avail = pool.filter((_,i)=>!usedIdx.includes(i));
  if(!avail.length || round>=TOTAL_Q){ showResult(); return; }

  const item = shuffle(avail)[0];
  usedIdx.push(pool.indexOf(item));
  cur = item;

  const others = [...new Set(shuffle(pool.filter(p=>p.song!==item.song).map(p=>p.song)))].slice(0,3);
  choices = shuffle([item.song, ...others]);

  document.getElementById('g-round').textContent = `${round+1} / ${TOTAL_Q}問`;
  buildChoices(); resetBar();
  document.getElementById('time-num').textContent = PLAY_SEC;
  document.getElementById('time-num').style.color = 'var(--red)';
  showPage('game');

  audioEl.src = item.url; audioEl.currentTime = 0;
  audioEl.play().then(()=>{ buildViz(); startTimer(); }).catch(()=>startTimer());
}

function stopAudio(){
  audioEl.pause(); audioEl.removeAttribute('src');
  clearInterval(timerInt); timerInt=null;
}

// ════════════════════════════════════
//  iTunes API
// ════════════════════════════════════
async function fetchPreview(artist, song){
  try{
    const q = encodeURIComponent(artist+' '+song);
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&entity=song&country=jp&limit=5`);
    const d = await r.json();
    const h = (d.results||[]).find(x=>x.previewUrl);
    return h ? h.previewUrl : null;
  }catch{ return null; }
}

// ════════════════════════════════════
//  タイマー
// ════════════════════════════════════
function startTimer(){
  elapsed = 0;
  timerInt = setInterval(()=>{
    if(paused) return;
    elapsed += 0.1;
    const left = Math.max(0, PLAY_SEC-elapsed);
    const pct  = left/PLAY_SEC;
    const c    = pct>0.5 ? 'var(--red)' : pct>0.25 ? '#ff8800' : '#ffcc00';
    const el   = document.getElementById('time-num');
    el.textContent=Math.ceil(left); el.style.color=c; el.style.textShadow=`0 0 18px ${c}`;
    updateBar(pct);
    if(left<=0){ clearInterval(timerInt); audioEl.pause(); timeUp(); }
  }, 100);
}
function resetBar(){ const b=document.getElementById('timer-bar'); b.style.transition='none'; b.style.width='100%'; }
function updateBar(pct){
  const b=document.getElementById('timer-bar');
  b.style.transition='width 0.15s linear,background 0.5s';
  b.style.width=(pct*100)+'%';
  b.style.background=pct>0.5?'var(--red)':pct>0.25?'#ff8800':'#ffcc00';
}
function timeUp(){
  if(answered)return;
  answered=true; miss++; combo=0; stopAudio(); hideViz(); updateScoreUI(); revealAnswer(false); scheduleNext();
}

// ════════════════════════════════════
//  ポーズ
// ════════════════════════════════════
function togglePause(){
  if(answered)return;
  paused=!paused;
  paused ? audioEl.pause() : audioEl.play().catch(()=>{});
  updatePauseBtn();
}
function updatePauseBtn(){
  const b=document.getElementById('btn-pause');
  b.textContent=paused?'▶ 再開':'⏸ ポーズ';
  b.classList.toggle('paused',paused);
}

// ════════════════════════════════════
//  選択肢
// ════════════════════════════════════
function buildChoices(){
  const c=document.getElementById('choices'); c.innerHTML='';
  choices.forEach((song,i)=>{
    const btn=document.createElement('button'); btn.className='cbtn';
    btn.innerHTML=`<span class="ol">${OPTS[i]}</span>${song}`;
    btn.addEventListener('click',()=>handleAnswer(song,btn));
    c.appendChild(btn);
  });
}
function handleAnswer(song,btn){
  if(answered||paused)return;
  // ── iOSの連続タップ防止：即座に全ボタン無効化 ──
  document.querySelectorAll('.cbtn').forEach(b=>b.disabled=true);
  answered=true; stopAudio(); hideViz();
  const ok=song===cur.song;
  document.querySelectorAll('.cbtn').forEach((b,i)=>{
    if(choices[i]===cur.song) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){score++;combo++;if(combo>=2)showCombo(combo);}else{miss++;combo=0;}
  updateScoreUI(); revealAnswer(ok); scheduleNext();
}
function revealAnswer(ok){
  document.getElementById('ans-emoji').textContent = ok ? '🎉' : '😭';
  document.getElementById('ans-name').textContent  = cur.song;
  document.getElementById('ans-name').style.color  = ok ? 'var(--green)' : '#ff6666';
  document.getElementById('ans-artist').textContent = cur.artistName;

  const el = document.getElementById('ans-reveal');
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = '';
  el.style.display = 'block';

  document.getElementById('time-num').style.display  = 'none';
  document.getElementById('btn-pause').style.display = 'none';
}
function scheduleNext(){
  round++;
  const mySession = gameSession; // 現在のセッションを記憶
  setTimeout(()=>{
    if(gameSession !== mySession) return; // タイトルに戻っていたら無視
    nextRound();
  }, 2200);
}
function updateScoreUI(){ document.getElementById('g-ok').textContent=score; document.getElementById('g-ng').textContent=miss; }
function showCombo(n){
  document.getElementById('combo-n').textContent=n+'x';
  const el=document.getElementById('combo-ov');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1700);
}

// ════════════════════════════════════
//  ビジュアライザー
// ════════════════════════════════════
function buildViz(){
  const v=document.getElementById('viz'); v.innerHTML='';
  [16,28,42,34,50,38,24,46,32,20].forEach((h,i)=>{
    const b=document.createElement('div'); b.className='vbar';
    b.style.cssText=`height:${h}px;animation-duration:${0.4+i*0.07}s;animation-delay:${i*0.05}s;`;
    v.appendChild(b);
  });
}
function hideViz(){ document.getElementById('viz').innerHTML=''; }

// ════════════════════════════════════
//  結果
// ════════════════════════════════════
function showResult(){
  const pct=(score/TOTAL_Q)*100;
  const rank=pct>=90?'🏆 完璧！':pct>=70?'🎸 すごい！':pct>=50?'🎵 なかなか！':pct>=30?'😅 もう少し！':'🔰 要特訓！';
  document.getElementById('res-score').innerHTML=`${score}<span>/${TOTAL_Q}</span>`;
  document.getElementById('res-rank').textContent=rank;
  document.getElementById('res-detail').textContent=`正解 ${score}問 ／ ミス ${miss}問`;
  const box=document.getElementById('no-audio-box');
  const lst=document.getElementById('no-audio-list');
  if(noAudioThisSession.length>0){
    lst.innerHTML=noAudioThisSession.map(s=>`• ${s}`).join('<br>');
    box.style.display='block';
  } else { box.style.display='none'; }
  updateExcludeBanner();
  showPage('result');
}

// ════════════════════════════════════
//  初期化
// ════════════════════════════════════
function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
// 起動時：選択状態クリア・スタート無効
selectedArtists = [];
isRandom = false;
document.getElementById('btn-start').disabled = true;
document.getElementById('btn-random').classList.remove('on');
showPage('title');
updateExcludeBanner();
</script>
